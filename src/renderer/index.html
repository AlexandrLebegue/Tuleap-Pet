<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Tuleap AI Companion</title>
    <!--
      Strict CSP: the renderer must never talk to remote hosts directly.
      All Tuleap / LLM calls go through the main process via IPC.
      'unsafe-inline' on style-src is required by shadcn/ui + Tailwind.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'none'"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
