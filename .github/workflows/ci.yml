name: CI

on:
  push:
    branches: [main, claude/features-phase5-10]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # postinstall (electron-builder install-app-deps) rebuilds native
      # modules for Electron's Node ABI. Unit tests run on plain Node,
      # so we rebuild better-sqlite3 against the runner's Node version.
      - run: npm rebuild better-sqlite3
      - run: npm test

  build:
    name: Electron build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
